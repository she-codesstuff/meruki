name: padosicare
description: "PadosiCare - AI-powered elderly care platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  google_maps_flutter: ^2.6.0
  geolocator: ^12.0.0
  http: ^1.2.0
  google_generative_ai: ^0.4.0
  intl: ^0.19.0
  fl_chart: ^0.68.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.0
  go_router: ^14.0.0
  provider: ^6.1.2
  speech_to_text: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
